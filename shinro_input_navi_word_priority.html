<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進路入力判定ナビ</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe2ea;
      --primary: #1d4ed8;
      --primary-soft: #dbeafe;
      --success: #047857;
      --success-soft: #d1fae5;
      --warning: #b45309;
      --warning-soft: #fef3c7;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .hero {
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
      border: 1px solid #dbeafe;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    h1 {
      margin: 12px 0 8px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.2;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      margin-top: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .section-title {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .subtle {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .controls {
      display: grid;
      gap: 12px;
    }
    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input[type="text"] {
      flex: 1 1 300px;
      min-width: 0;
      height: 46px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 15px;
      background: #fff;
      color: var(--text);
    }
    input[type="text"]:focus {
      outline: 2px solid #bfdbfe;
      border-color: #93c5fd;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .primary-btn {
      background: var(--primary);
      color: #fff;
    }
    .ghost-btn {
      background: #eef2f7;
      color: var(--text);
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }
    .chip.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: #bfdbfe;
    }
    .quick-groups {
      display: grid;
      gap: 12px;
    }
    .group-title {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--muted);
    }
    .result-header {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .badge.progress {
      background: var(--primary-soft);
      color: var(--primary);
    }
    .badge.job {
      background: var(--success-soft);
      color: var(--success);
    }
    .badge.other {
      background: var(--warning-soft);
      color: var(--warning);
    }
    .keyword {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.3;
    }
    .rule-box {
      border-radius: 14px;
      padding: 14px;
      margin-top: 14px;
      border: 1px solid var(--line);
      background: #fafcff;
    }
    .rule-box.warning {
      background: var(--warning-soft);
      border-color: #fde68a;
    }
    .rule-box.danger {
      background: var(--danger-soft);
      border-color: #fecaca;
    }
    .kv-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--line);
    }
    .kv-table th,
    .kv-table td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 14px;
    }
    .kv-table th {
      width: 30%;
      background: #f8fafc;
      text-align: left;
    }
    .kv-table tr:last-child th,
    .kv-table tr:last-child td {
      border-bottom: 0;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
    }
    .list {
      margin: 0;
      padding-left: 18px;
    }
    .list li {
      margin-bottom: 8px;
    }
    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
    }
    .match-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .match-btn {
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
    }
    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .wrap {
        padding: 16px 12px 32px;
      }
      .card,
      .hero {
        padding: 16px;
      }
      .keyword {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>進路入力判定ナビ</h1>
    </section>

    <div class="grid">
      <section class="card">
        <h2 class="section-title">入力して判定する</h2>
        <p class="subtle">例：通信制大学、専門学校、高卒求人、公務員、アルバイト、浪人、留学</p>

        <div class="controls">
          <div>
            <label class="field-label" for="keywordInput">進路キーワード</label>
            <div class="input-row">
              <input id="keywordInput" type="text" placeholder="キーワードを入力">
              <button id="judgeButton" class="primary-btn" type="button">判定する</button>
              <button id="resetButton" class="ghost-btn" type="button">リセット</button>
            </div>
          </div>

          <div>
            <div class="field-label">カテゴリで絞る</div>
            <div id="filterChips" class="chip-row"></div>
          </div>

          <div>
            <div class="field-label">よく使うケース</div>
            <div id="quickCases" class="quick-groups"></div>
          </div>
        </div>

      </section>

      <section class="card">
        <h2 class="section-title">判定結果</h2>
        <div id="resultArea" class="empty">左側でキーワードを入力するか、よく使うケースを押してください。</div>
      </section>
    </div>
  </div>

        button.type = 'button';
        button.className = label === currentFilter ? 'chip active' : 'chip';
        button.textContent = label;
        button.addEventListener('click', function() {
          currentFilter = label;
          renderFilters();
          renderQuickCases();
        });
        filterChipsArea.appendChild(button);
      });
    }

    function renderQuickCases() {
      quickCasesArea.textContent = '';
      const groupsToShow = currentFilter === 'すべて'
        ? ['進学', '就職', 'その他']
        : [currentFilter];

      groupsToShow.forEach(function(groupName) {
        const wrapper = document.createElement('div');

        const title = document.createElement('h3');
        title.className = 'group-title';
        title.textContent = groupName;
        wrapper.appendChild(title);

        const row = document.createElement('div');
        row.className = 'chip-row';

        (quickCases[groupName] || []).forEach(function(keyword) {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'chip';
          button.textContent = keyword;
          button.addEventListener('click', function() {
            keywordInput.value = keyword;
            showResult(keyword);
          });
          row.appendChild(button);
        });

        wrapper.appendChild(row);
        quickCasesArea.appendChild(wrapper);
      });
    }

    function createRuleBox(titleText, bodyText, type) {
      const box = document.createElement('div');
      box.className = type ? 'rule-box ' + type : 'rule-box';

      const title = document.createElement('div');
      title.className = 'field-label';
      title.textContent = titleText;
      box.appendChild(title);

      const body = document.createElement('div');
      body.textContent = bodyText;
      box.appendChild(body);

      return box;
    }

    function renderPattern(pattern, sourceText) {
      resultArea.textContent = '';

      const header = document.createElement('div');
      header.className = 'result-header';

      const badge = document.createElement('span');
      badge.className = 'badge ' + getCategoryBadgeClass(pattern.category);
      badge.textContent = pattern.category;
      header.appendChild(badge);

      const source = document.createElement('span');
      source.className = 'subtle';
      source.textContent = '入力：' + sourceText;
      header.appendChild(source);

      resultArea.appendChild(header);

      const keyword = document.createElement('div');
      keyword.className = 'keyword';
      keyword.textContent = pattern.keyword;
      resultArea.appendChild(keyword);

      const table = document.createElement('table');
      table.className = 'kv-table';

      pattern.fields.forEach(function(field) {
        const row = document.createElement('tr');
        const th = document.createElement('th');
        const td = document.createElement('td');
        th.textContent = field.label;
        td.textContent = field.value || '不要';
        row.appendChild(th);
        row.appendChild(td);
        table.appendChild(row);
      });

      resultArea.appendChild(table);

      const caution = extractCaution(pattern);
      if (caution) {
        const type = caution.indexOf('原則使用不可') !== -1 ? 'danger' : 'warning';
        resultArea.appendChild(createRuleBox('ケース別の注意', caution, type));
      }
    }

    function extractCaution(pattern) {
      const fields = pattern.fields;
      for (let i = 0; i < fields.length; i += 1) {
        const text = String(fields[i].value || '');
        if (text.indexOf('※') !== -1 || text.indexOf('注意') !== -1 || text.indexOf('原則使用不可') !== -1) {
          return text;
        }
      }
      return '';
    }

    function renderCandidates(rawKeyword, candidates) {
      resultArea.textContent = '';

      const message = document.createElement('div');
      message.className = 'empty';
      message.textContent = '完全一致が見つかりませんでした。近い候補を選んでください。';
      resultArea.appendChild(message);

      if (rawKeyword) {
        const source = document.createElement('div');
        source.className = 'subtle';
        source.style.marginTop = '8px';
        source.textContent = '入力：' + rawKeyword;
        resultArea.appendChild(source);
      }

      const list = document.createElement('div');
      list.className = 'match-list';

      candidates.forEach(function(candidate) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'match-btn';
        button.textContent = candidate.keyword + ' [' + candidate.category + ']';
        button.addEventListener('click', function() {
          keywordInput.value = candidate.keyword;
          renderPattern(candidate, candidate.keyword);
        });
        list.appendChild(button);
      });

      resultArea.appendChild(list);
    }

    function showResult(rawKeyword) {
      const inputValue = String(rawKeyword || '').trim();
      if (!inputValue) {
        resultArea.textContent = 'キーワードを入力してください。';
        return;
      }

      const resolvedKeyword = resolveKeyword(inputValue);
      const pattern = getPatternByKeyword(resolvedKeyword);

      if (pattern && (currentFilter === 'すべて' || pattern.category === currentFilter)) {
        renderPattern(pattern, inputValue);
        return;
      }

      const candidates = findCandidates(inputValue);
      if (candidates.length > 0) {
        renderCandidates(inputValue, candidates);
        return;
      }

      resultArea.textContent = '該当するパターンが見つかりませんでした。キーワードを変えるか、カテゴリを「すべて」にして試してください。';
    }

    function resetAll() {
      keywordInput.value = '';
      currentFilter = 'すべて';
      renderFilters();
      renderQuickCases();
      resultArea.textContent = '左側でキーワードを入力するか、よく使うケースを押してください。';
    }

    judgeButton.addEventListener('click', function() {
      showResult(keywordInput.value);
    });

    resetButton.addEventListener('click', function() {
      resetAll();
    });

    keywordInput.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        showResult(keywordInput.value);
      }
    });

    renderFilters();
    renderQuickCases();
  </script>
</body>
</html>
