<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>オリジナル格付けチェック v27</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#0d0d0d;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
iframe{width:100%;height:100%;border:none;display:block;background:#0d0d0d}
.loading{position:fixed;inset:0;display:grid;place-items:center;color:#f3d892;background:radial-gradient(circle at top,#2a2a2a 0%,#151515 35%,#0d0d0d 100%);font-weight:800;letter-spacing:.08em;z-index:10}.hidden{display:none}
</style>
</head>
<body>
<div id="loading" class="loading">読み込み中…</div>
<iframe id="outerFrame"></iframe>
<script>
const loading=document.getElementById('loading');
const outerFrame=document.getElementById('outerFrame');
outerFrame.src='./kakuzuke-check-premium-v25.html'+window.location.search;

outerFrame.addEventListener('load',()=>{
  const outerDoc=outerFrame.contentDocument;
  const innerFrame=outerDoc && outerDoc.getElementById('appFrame');
  if(!innerFrame){ loading.classList.add('hidden'); return; }

  function patchInner(){
    const innerDoc=innerFrame.contentDocument;
    const innerWin=innerFrame.contentWindow;
    if(!innerDoc||!innerWin)return;
    loading.classList.add('hidden');

    if(!innerDoc.getElementById('v27-patch-style')){
      const style=innerDoc.createElement('style');
      style.id='v27-patch-style';
      style.textContent=`
        #host-op-band{display:none !important;}
        .grade-cell.active-rank .team-tag,
        .grade-cell.active-rank .ghost-tag,
        .grade-cell.active-rank .void-tag,
        .answer-name .team-tag,
        .answer-name .ghost-tag,
        .answer-name .void-tag{
          max-width:none !important;
          overflow:visible !important;
          text-overflow:clip !important;
          white-space:nowrap !important;
        }
        body.mode-display #board-title{display:none !important;}
        body.mode-display .answer-board{display:block !important; margin-bottom:14px !important;}
        body.mode-display .grade-board{display:grid !important;}
        body.mode-display .admin-grid{display:none !important;}
        body.mode-display .check-strip{justify-content:flex-start !important;}
        body.mode-display .answer-name .team-tag,
        body.mode-display .answer-name .ghost-tag,
        body.mode-display .answer-name .void-tag{
          font-size:20px !important;
          padding:10px 16px !important;
        }
        .apply-toast{
          position:fixed;
          left:50%;
          bottom:24px;
          transform:translateX(-50%) translateY(12px);
          background:linear-gradient(180deg,#2f88f0,#1258a9);
          color:#fff;
          padding:12px 18px;
          border-radius:999px;
          font-weight:800;
          font-size:14px;
          box-shadow:0 10px 24px rgba(0,0,0,.28);
          opacity:0;
          pointer-events:none;
          transition:opacity .2s ease, transform .2s ease;
          z-index:99999;
        }
        .apply-toast.show{
          opacity:1;
          transform:translateX(-50%) translateY(0);
        }
      `;
      innerDoc.head.appendChild(style);
    }

    function normalizeKochira(){
      innerDoc.querySelectorAll('#grade-body .grade-cell.active-rank').forEach(cell=>{
        const tag=cell.querySelector('.team-tag, .ghost-tag, .void-tag');
        if(tag && tag.textContent.trim()!=='---') tag.textContent='こちら';
      });
    }

    function ensureToast(){
      let toast=innerDoc.getElementById('apply-toast');
      if(toast) return toast;
      toast=innerDoc.createElement('div');
      toast.id='apply-toast';
      toast.className='apply-toast';
      toast.textContent='設定が反映されました';
      innerDoc.body.appendChild(toast);
      return toast;
    }

    function showToast(){
      const toast=ensureToast();
      toast.classList.add('show');
      clearTimeout(innerWin.__applyToastTimer);
      innerWin.__applyToastTimer=setTimeout(()=>toast.classList.remove('show'),1400);
    }

    const originalRenderBoard=innerWin.renderBoard;
    if(!innerWin.__v27_render_patched && typeof originalRenderBoard==='function'){
      innerWin.__v27_render_patched=true;
      innerWin.renderBoard=function(){
        const result=originalRenderBoard.apply(this,arguments);
        normalizeKochira();
        const band=innerDoc.getElementById('host-op-band');
        if(band) band.style.display='none';
        return result;
      };
    }

    const originalApplyQuestionSettings=innerWin.applyQuestionSettings;
    if(!innerWin.__v27_apply_patched && typeof originalApplyQuestionSettings==='function'){
      innerWin.__v27_apply_patched=true;
      innerWin.applyQuestionSettings=function(){
        const result=originalApplyQuestionSettings.apply(this,arguments);
        showToast();
        const band=innerDoc.getElementById('host-op-band');
        if(band) band.style.display='none';
        normalizeKochira();
        return result;
      };
    }

    normalizeKochira();
    const band=innerDoc.getElementById('host-op-band');
    if(band) band.style.display='none';
  }

  innerFrame.addEventListener('load',patchInner,{once:false});
  patchInner();
});
</script>
</body>
</html>
