<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>オリジナル格付けチェック</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#111;color:#fff}main{max-width:900px;margin:auto;padding:16px}.box{background:#1c1c1c;border:2px solid #c99a1a;border-radius:16px;padding:16px;margin:12px 0}.title{background:linear-gradient(#fff2a6,#d29d1e);color:#321b00;text-align:center;border-radius:16px;padding:18px 12px;font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-weight:900;font-size:36px;line-height:1.2}.row{display:flex;gap:10px;flex-wrap:wrap}.row input{flex:1;min-width:220px;padding:12px;border-radius:10px;border:1px solid #666;background:#111;color:#fff}.btn{padding:12px 16px;border:0;border-radius:10px;font-weight:700;cursor:pointer}.gold{background:linear-gradient(#fff1a9,#b57a0b);color:#2f1e00}.green{background:#1d7a3b;color:#fff}.red{background:#99231d;color:#fff}.blue{background:#1f5ba5;color:#fff}.board{display:grid;grid-template-columns:160px repeat(6,1fr);gap:6px;font-size:14px}.cell{padding:10px;border-radius:8px;text-align:center;background:#2a2a2a}.head{font-weight:800}.r0{background:linear-gradient(#fff5b6,#e0b84e);color:#2f1d00}.r1{background:linear-gradient(#fcfcfc,#d8d8d8);color:#222}.r2{background:linear-gradient(#4d8ddf,#2568c5)}.r3{background:linear-gradient(#f7f7f7,#dedede);color:#111}.r4{background:linear-gradient(#3b2910,#22170a)}.r5{background:linear-gradient(#111,#000);color:#ff4d4d}.tag{display:inline-block;background:#9e1818;color:#fff;padding:6px 10px;border-radius:8px;font-weight:700}#doors button{width:110px;height:150px;font-size:44px}#a{background:#c92c27}#b{background:#2169c6}#c{background:#c98a12;display:none}</style></head><body><main><div class="title">オリジナル<br>格付けチェック</div><div id="setup" class="box"><h2>チーム登録</h2><div id="inputs"></div><div class="row"><button class="btn gold" onclick="addTeam()">チーム追加</button><button class="btn green" onclick="startGame()">開始</button></div></div><div id="game" class="box" style="display:none"><div class="row"><strong id="q">第1問</strong><span id="team"></span></div><div class="row"><input id="qt" value="高級品はどっち？"><select id="mode" onchange="applyMode()"><option value="2">2択</option><option value="3">3択</option></select></div><div id="doors" class="row"><button id="a" class="btn" onclick="answer('A')">A</button><button id="b" class="btn" onclick="answer('B')">B</button><button id="c" class="btn" onclick="answer('C')">C</button></div><div class="row"><button class="btn green" onclick="judge(0)">正解</button><button class="btn red" onclick="judge(1)">不正解</button><button class="btn blue" onclick="judge(2)" id="judgeC" style="display:none">絶対ありえへん</button><button class="btn gold" onclick="nextTurn()">次のチーム</button></div></div><div class="box"><h2>盤面</h2><div class="board" id="board"></div></div></main><script>const ranks=['一流','普通','二流','三流','そっくりさん','映す価値なし'];let teams=[],i=0,q=1,last='-';function init(){inputs.innerHTML='';for(let n=0;n<2;n++)addTeam(String.fromCharCode(65+n));renderBoard()}function addTeam(v=''){if(inputs.children.length>=8)return alert('最大8チームです');const d=document.createElement('div');d.className='row';d.innerHTML='<input class="nm" placeholder="チーム名" value="'+(v?('チーム'+v):'')+'">';inputs.appendChild(d)}function startGame(){teams=[...document.querySelectorAll('.nm')].map(x=>x.value.trim()).filter(Boolean).map(name=>({name,rank:0}));if(teams.length<2)return alert('2チーム以上入力してください');game.style.display='block';setup.style.display='none';update();renderBoard()}function applyMode(){const on=mode.value==='3';c.style.display=on?'inline-block':'none';judgeC.style.display=on?'inline-block':'none'}function update(){document.getElementById('q').textContent='第'+q+'問';document.getElementById('team').textContent=teams[i]?('回答：'+teams[i].name):'';applyMode()}function answer(v){last=v;renderBoard()}function judge(down){if(!teams[i])return;teams[i].rank=Math.min(5,teams[i].rank+down);renderBoard()}function nextTurn(){i++;if(i>=teams.length){i=0;q++;}update();last='-';renderBoard()}function renderBoard(){board.innerHTML='';['チーム',...ranks].forEach((h,idx)=>{const c=document.createElement('div');c.className='cell head '+(idx?('r'+(idx-1)):'');c.textContent=h;board.appendChild(c)});teams.forEach((t,idx)=>{const name=document.createElement('div');name.className='cell';name.innerHTML='<span class="tag">'+(t.rank===5?'---':t.name)+'</span>';board.appendChild(name);for(let r=0;r<6;r++){const c=document.createElement('div');c.className='cell r'+r;if(t.rank===r)c.innerHTML='<span class="tag">'+(t.rank===5?'---':t.name)+'</span>';if(idx===i&&t.rank===r)c.style.outline='3px solid #ffed8d';board.appendChild(c)}})}init();</script></body></html>
