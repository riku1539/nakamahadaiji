<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>オリジナル格付けチェック</title>
<style>
:root{--gold1:#fff7c7;--gold2:#f1cb5b;--gold3:#d29d1e;--gold4:#8b5b06;--white:#f6f3ea}
html,body{margin:0;padding:0;height:100%;background:radial-gradient(circle at top,#262626 0%,#141414 38%,#0b0b0b 100%);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--white)}
.app{min-height:100%;display:flex;align-items:center;justify-content:center;padding:18px}.card{width:min(100%,820px);background:linear-gradient(180deg,rgba(255,245,200,.08),rgba(255,255,255,.02)),#1a1a1a;border:4px solid var(--gold3);border-radius:24px;overflow:hidden;box-shadow:0 14px 34px rgba(0,0,0,.38),inset 0 0 0 2px rgba(255,232,152,.24)}
.header{position:relative;padding:32px 20px 22px;text-align:center;background:radial-gradient(circle at 20% 15%,rgba(255,255,255,.65),transparent 16%),radial-gradient(circle at 80% 10%,rgba(255,255,255,.35),transparent 16%),linear-gradient(180deg,var(--gold1),var(--gold2) 45%,var(--gold3) 80%,#bb7f0c);border-bottom:4px solid #8a5a06;color:#3f2500}.header:before,.header:after{content:"❦";position:absolute;top:12px;font-size:30px;color:#a76d09}.header:before{left:16px}.header:after{right:16px}.header h1{margin:0;font-family:"Yu Mincho","Hiragino Mincho ProN","BIZ UDPMincho","Times New Roman",serif;font-size:clamp(34px,6vw,58px);line-height:1.16;letter-spacing:.12em;font-weight:900;color:#2f1700;text-shadow:0 1px 0 rgba(255,255,255,.65),0 2px 0 rgba(255,241,180,.9),0 4px 10px rgba(120,70,0,.18)}.header p{margin:12px 0 0;font-size:12px;color:#5e3c00;font-weight:900;letter-spacing:.18em;text-transform:uppercase;opacity:.9}
.body{padding:24px;background:linear-gradient(180deg,#1b1b1b,#101010)}.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.mode-btn{appearance:none;border:none;border-radius:20px;padding:22px 16px;background:linear-gradient(180deg,#272727,#131313);border:1px solid rgba(255,223,127,.24);color:#fff;cursor:pointer;transition:transform .15s ease,filter .15s ease,box-shadow .15s ease;font-weight:900;font-size:22px;min-height:136px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}.mode-btn small{display:block;margin-top:10px;font-size:12px;font-weight:700;color:#d9c28b;line-height:1.65}.mode-btn:hover{filter:brightness(1.04)}.mode-btn:active{transform:translateY(1px)}.mode-btn.primary{background:linear-gradient(180deg,#fff0a6,#ddb149 60%,#b57a0b);color:#2f1e00}.note{margin-top:16px;padding:12px 14px;border-radius:14px;background:linear-gradient(180deg,#1f160a,#100b06);border:1px solid rgba(255,223,127,.18);font-size:13px;line-height:1.8;color:#f3d892}.shell{display:none;height:100%}.shell.active{display:block}iframe{width:100%;height:100vh;border:none;display:block;background:#0d0d0d}.loading{position:fixed;inset:0;display:none;place-items:center;background:rgba(13,13,13,.84);color:#f3d892;font-weight:800;z-index:30}.loading.show{display:grid}.mode-lock{position:fixed;top:14px;right:14px;z-index:25;display:none;padding:10px 14px;border-radius:999px;background:linear-gradient(180deg,#2b2b2b,#141414);border:1px solid rgba(255,223,127,.24);color:#fff;font-size:13px;font-weight:800;box-shadow:0 8px 18px rgba(0,0,0,.25)}.mode-lock.show{display:inline-flex}
@media (max-width:720px){.mode-grid{grid-template-columns:1fr}.mode-btn{min-height:112px;font-size:20px}}
</style>
</head>
<body>
<div id="launcher" class="app">
  <div class="card">
    <div class="header">
      <h1>オリジナル<br>格付けチェック</h1>
      <p>Mode Select</p>
    </div>
    <div class="body">
      <div class="mode-grid">
        <button class="mode-btn primary" data-mode="host">教員用<small>進行・設定・判定を行います</small></button>
        <button class="mode-btn" data-mode="display">表示用<small>会場やスクリーンに表示します</small></button>
        <button class="mode-btn" data-mode="team">チーム用<small>各チームの回答と待機に使います</small></button>
      </div>
      <div class="note">＜基本＞ ここで選んだ表示モードで開始します。開始後はこの画面では切り替えできません。</div>
    </div>
  </div>
</div>
<div id="shell" class="shell"><iframe id="mainFrame"></iframe></div>
<div id="loading" class="loading">読み込み中</div>
<div id="modeLock" class="mode-lock"></div>
<script>
const launcher=document.getElementById('launcher');
const shell=document.getElementById('shell');
const mainFrame=document.getElementById('mainFrame');
const loading=document.getElementById('loading');
const modeLock=document.getElementById('modeLock');

function startMode(mode){
  launcher.style.display='none';
  shell.classList.add('active');
  loading.classList.add('show');
  modeLock.textContent='表示固定：' + (mode==='host' ? '教員用' : mode==='display' ? '表示用' : 'チーム用');
  modeLock.classList.add('show');
  mainFrame.src='./kakuzuke-check-premium-v28.html?mode='+encodeURIComponent(mode);
}

document.querySelectorAll('.mode-btn').forEach(btn=>btn.addEventListener('click',()=>startMode(btn.dataset.mode)));

function patchDocument(doc){
  if(!doc) return;
  if(!doc.getElementById('v33-global-style')){
    const style=doc.createElement('style');
    style.id='v33-global-style';
    style.textContent=`
      .mode-toolbar,#role-note,#host-op-band{display:none !important;visibility:hidden !important;height:0 !important;overflow:hidden !important;pointer-events:none !important;}
      .grade-cell.active-rank .team-tag,.grade-cell.active-rank .ghost-tag,.grade-cell.active-rank .void-tag,
      .answer-name .team-tag,.answer-name .ghost-tag,.answer-name .void-tag{max-width:none !important;overflow:visible !important;text-overflow:clip !important;white-space:nowrap !important;}
      body.mode-display #board-title{display:none !important;}
      body.mode-display .answer-board{display:block !important;margin-bottom:14px !important;}
      body.mode-display .grade-board{display:grid !important;}
      body.mode-display .admin-grid{display:none !important;}
      body.mode-display .check-strip{justify-content:flex-start !important;}
      body.mode-display .answer-name .team-tag,body.mode-display .answer-name .ghost-tag,body.mode-display .answer-name .void-tag{font-size:20px !important;padding:10px 16px !important;}
      body.mode-display .answer-row{grid-template-columns:185px repeat(3,minmax(120px,1fr)) !important;}
      body.mode-display .answer-header{grid-template-columns:185px repeat(3,minmax(120px,1fr)) !important;}
      body.mode-display .grade-row{grid-template-columns:185px repeat(6,minmax(110px,1fr)) !important;}
      body.mode-display .grade-header{grid-template-columns:185px repeat(6,minmax(110px,1fr)) !important;}
      .apply-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(12px);background:linear-gradient(180deg,#2f88f0,#1258a9);color:#fff;padding:12px 18px;border-radius:999px;font-weight:800;font-size:14px;box-shadow:0 10px 24px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:99999}
      .apply-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
      .frame{border-width:4px !important;box-shadow:0 14px 34px rgba(0,0,0,.38), inset 0 0 0 2px rgba(255,232,152,.22) !important}
      .card,.control-group,.secret-stage,.answer-name,.answer-cell,.grade-name,.grade-cell,.check-box,.team-status-wait,.team-self-summary,.shared-question-note{border-color:rgba(255,223,127,.22) !important}
      .answer-name,.grade-name,.answer-cell,.grade-cell{border-radius:16px !important}
      .grade-head,.answer-head,.check-box{border-radius:14px !important}
      .team-tag,.ghost-tag,.void-tag{border-radius:12px !important}
      .help,.mini-note,.danger-note,.subtle{display:none !important}
      .ornate-header,.header{position:relative !important; overflow:hidden !important;}
      .ornate-header:after,.ornate-header:before,.header:after,.header:before{opacity:.92 !important}
      .ornate-header h1,.header h1{letter-spacing:.14em !important;text-shadow:0 1px 0 rgba(255,255,255,.7),0 3px 0 rgba(255,240,184,.95),0 10px 18px rgba(124,73,0,.14) !important}
      .secret-stage,.control-group,.card{box-shadow:inset 0 0 0 1px rgba(255,255,255,.03),0 8px 18px rgba(0,0,0,.18) !important}
      body.mode-host .control-group button.btn-gold{background:linear-gradient(180deg,#fff0a6,#ddb149 60%,#b57a0b) !important;color:#2f1e00 !important}
      body.mode-host .control-group button.btn-blue{background:linear-gradient(180deg,#4e96f2,#1d5aa7) !important}
      body.mode-host .control-group button.btn-dark{background:linear-gradient(180deg,#5f5f5f,#2d2d2d) !important}
    `;
    doc.head.appendChild(style);
  }

  function normalizeLabels(){
    doc.querySelectorAll('#grade-body .grade-cell.active-rank').forEach(cell=>{
      const tag=cell.querySelector('.team-tag, .ghost-tag, .void-tag');
      if(tag && tag.textContent.trim()!=='---') tag.textContent='こちら';
    });
    doc.querySelectorAll('button').forEach(btn=>{btn.textContent=btn.textContent.replace(/！/g,'');});
    const walker=doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, null);
    const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
    nodes.forEach(n=>{
      let s=n.nodeValue||'';
      s=s.replace(/チーム用試作モード/g,'チーム用画面');
      s=s.replace(/チーム用試作/g,'チーム用');
      s=s.replace(/Prototype Edition/g,'STANDARD EDITION');
      s=s.replace(/チェック開始！/g,'チェック開始');
      n.nodeValue=s;
    });
  }

  function hideModeUi(){
    doc.querySelectorAll('.mode-toolbar,#role-note,#host-op-band').forEach(el=>{
      el.style.display='none';
      el.style.visibility='hidden';
      el.style.height='0';
      el.style.overflow='hidden';
      el.style.pointerEvents='none';
    });
  }

  function ensureToast(){
    let toast=doc.getElementById('apply-toast');
    if(toast) return toast;
    toast=doc.createElement('div');
    toast.id='apply-toast';
    toast.className='apply-toast';
    toast.textContent='内容を更新しました';
    doc.body.appendChild(toast);
    return toast;
  }

  const win=doc.defaultView;
  if(win && typeof win.applyQuestionSettings==='function' && !win.__v33_apply_patched){
    const originalApply=win.applyQuestionSettings;
    win.__v33_apply_patched=true;
    win.applyQuestionSettings=function(){
      const result=originalApply.apply(this,arguments);
      const toast=ensureToast();
      toast.textContent='内容を更新しました';
      toast.classList.add('show');
      clearTimeout(win.__applyToastTimer);
      win.__applyToastTimer=setTimeout(()=>toast.classList.remove('show'),1400);
      normalizeLabels();
      hideModeUi();
      return result;
    };
  }
  if(win && typeof win.nextQuestion==='function' && !win.__v33_nextq_patched){
    const originalNextQuestion=win.nextQuestion;
    win.__v33_nextq_patched=true;
    win.nextQuestion=function(){
      const result=originalNextQuestion.apply(this,arguments);
      const toast=ensureToast();
      toast.textContent='次の問題へ進みました';
      toast.classList.add('show');
      clearTimeout(win.__applyToastTimer);
      win.__applyToastTimer=setTimeout(()=>toast.classList.remove('show'),1400);
      normalizeLabels();
      hideModeUi();
      return result;
    };
  }
  if(win && typeof win.nextTurn==='function' && !win.__v33_nextt_patched){
    const originalNextTurn=win.nextTurn;
    win.__v33_nextt_patched=true;
    win.nextTurn=function(){
      const result=originalNextTurn.apply(this,arguments);
      const toast=ensureToast();
      toast.textContent='次のチームへ進みました';
      toast.classList.add('show');
      clearTimeout(win.__applyToastTimer);
      win.__applyToastTimer=setTimeout(()=>toast.classList.remove('show'),1400);
      normalizeLabels();
      hideModeUi();
      return result;
    };
  }
  if(win && typeof win.renderBoard==='function' && !win.__v33_render_patched){
    const originalRender=win.renderBoard;
    win.__v33_render_patched=true;
    win.renderBoard=function(){
      const result=originalRender.apply(this,arguments);
      normalizeLabels();
      hideModeUi();
      return result;
    };
  }

  hideModeUi();
  normalizeLabels();

  if(!doc.body.__v33_mode_observer){
    const observer=new MutationObserver(()=>{hideModeUi(); normalizeLabels();});
    observer.observe(doc.body,{childList:true,subtree:true,characterData:true});
    doc.body.__v33_mode_observer=true;
  }
}

function patchAllFrames(frameEl){
  try{
    const doc=frameEl.contentDocument;
    if(!doc) return;
    patchDocument(doc);
    doc.querySelectorAll('iframe').forEach(child=>{
      child.addEventListener('load',()=>patchAllFrames(child),{once:false});
      if(child.contentDocument) patchAllFrames(child);
    });
  }catch(e){}
}

mainFrame.addEventListener('load',()=>{
  loading.classList.remove('show');
  patchAllFrames(mainFrame);
});
</script>
</body>
</html>
