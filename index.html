<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Shelf</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #040714;
      color: #ffffff;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    }

    body {
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 0%, rgba(74, 89, 255, 0.16), transparent 24%),
        radial-gradient(circle at 100% 100%, rgba(74, 181, 255, 0.07), transparent 22%),
        #040714;
    }

    .page {
      width: 100%;
      max-width: 1440px;
      height: 100vh;
      margin: 0 auto;
      padding: 18px 18px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 0 0 auto;
    }

    .brand-title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1;
    }

    .menu-button {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .menu-lines {
      width: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .menu-lines span {
      display: block;
      width: 18px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
    }

    .layout {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      gap: 28px;
      align-items: stretch;
    }

    .left-column {
      height: 100%;
      min-height: 0;
    }

    .left-panel {
      height: 100%;
      border-radius: 30px;
      padding: 24px 22px;
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      box-shadow: 0 24px 60px rgba(0,0,0,0.34);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .preview-image-wrap {
      width: 100%;
      max-width: 220px;
      aspect-ratio: 1 / 1;
      border-radius: 26px;
      overflow: hidden;
      background: #d9d9de;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .preview-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #d9d9de;
    }

    .preview-meta {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .preview-genre {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 14px;
      color: rgba(255,255,255,0.86);
    }

    .preview-title {
      margin: 0;
      font-size: 34px;
      line-height: 1.22;
      font-weight: 700;
      letter-spacing: 0.01em;
      word-break: break-word;
    }

    .preview-description {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
    }

    .action-row {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .primary-button {
      min-height: 50px;
      padding: 0 22px;
      border-radius: 999px;
      background: #ffffff;
      color: #111420;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .primary-button:hover {
      transform: translateY(-1px);
    }

    .right-column {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .right-panel-title {
      margin: 8px 0 18px 0;
      font-size: 54px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.04em;
      flex: 0 0 auto;
    }

    .app-list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .app-list::-webkit-scrollbar {
      width: 10px;
    }

    .app-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
    }

    .app-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .app-card {
      width: 100%;
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      color: inherit;
    }

    .app-card:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    .app-card.is-active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.28);
      box-shadow: 0 10px 28px rgba(0,0,0,0.2);
    }

    .app-card-image-wrap {
      width: 120px;
      height: 120px;
      border-radius: 18px;
      overflow: hidden;
      background: #d9d9de;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .app-card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #d9d9de;
    }

    .app-card-content {
      min-width: 0;
    }

    .app-card-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.62);
    }

    .app-card-title {
      margin: 0 0 8px 0;
      font-size: 23px;
      line-height: 1.3;
      font-weight: 700;
      word-break: break-word;
      color: #ffffff;
    }

    .app-card-description {
      margin: 0;
      font-size: 16px;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
      word-break: break-word;
    }

    .empty-message {
      padding: 32px 20px;
      border-radius: 22px;
      border: 1px dashed rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.72);
      text-align: center;
    }

    @media (max-width: 980px) {
      html, body {
        height: auto;
      }

      body {
        overflow: auto;
      }

      .page {
        height: auto;
        min-height: 100vh;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .right-column {
        overflow: visible;
      }

      .app-list {
        overflow: visible;
        min-height: auto;
        padding-right: 0;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px;
      }

      .brand-title {
        font-size: 24px;
      }

      .menu-button {
        width: 48px;
        height: 48px;
      }

      .left-panel {
        padding: 18px 16px 22px 16px;
        border-radius: 24px;
      }

      .preview-image-wrap {
        max-width: 180px;
        border-radius: 20px;
      }

      .preview-title {
        font-size: 28px;
      }

      .preview-description {
        font-size: 16px;
      }

      .right-panel-title {
        font-size: 36px;
        margin-top: 0;
      }

      .app-card {
        grid-template-columns: 92px minmax(0, 1fr);
        padding: 12px;
        gap: 12px;
        border-radius: 22px;
      }

      .app-card-image-wrap {
        width: 92px;
        height: 92px;
        border-radius: 14px;
      }

      .app-card-title {
        font-size: 18px;
      }

      .app-card-description {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h1 class="brand-title">APP SHELF</h1>
      <button class="menu-button" type="button" aria-label="メニュー表示">
        <span class="menu-lines">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </header>

    <main class="layout">
      <section class="left-column" aria-label="選択中アプリの表示">
        <div class="left-panel">
          <div class="preview-image-wrap">
            <img id="previewImage" class="preview-image" src="" alt="">
          </div>
          <div class="preview-meta">
            <div id="previewGenre" class="preview-genre"></div>
            <h2 id="previewTitle" class="preview-title"></h2>
            <p id="previewDescription" class="preview-description"></p>
            <div class="action-row">
              <a id="openAppButton" class="primary-button" href="#" target="_blank" rel="noopener noreferrer">アプリを開く</a>
            </div>
          </div>
        </div>
      </section>

      <section class="right-column" aria-label="アプリ一覧">
        <h2 class="right-panel-title">APPS</h2>
        <div id="appList" class="app-list"></div>
      </section>
    </main>
  </div>

  <script>
const apps = [
  {
    id: '2026-03-25-kaonavi-goal',
    title: 'カオナビ評価つくるくん',
    shortDescription: '評価される目標を作成します',
    url: 'evaluation_goal_generator.html',
    image: 'kaonavi-hyouka-tsukurukun.png',
    genre: '人事',
    createdAt: '2026-03-25'
  }
　 {
    id: '2026-03-25-shinro-input-navi',
    title: '進路入力判定ナビ',
    shortDescription: '進路入力の区分・入力例・注意点を確認できます',
    url: 'shinro_input_navi_word_priority.html',
    image: 'shinro-input-navi-thumbnail.png',
    genre: '進路',
    createdAt: '2026-03-25'
  }
];
    const previewImage = document.getElementById('previewImage');
    const previewGenre = document.getElementById('previewGenre');
    const previewTitle = document.getElementById('previewTitle');
    const previewDescription = document.getElementById('previewDescription');
    const openAppButton = document.getElementById('openAppButton');
    const appList = document.getElementById('appList');

    let selectedAppId = '';

    function sortApps(list) {
      return list.slice().sort(function(a, b) {
        const genreCompare = a.genre.localeCompare(b.genre, 'ja');
        if (genreCompare !== 0) {
          return genreCompare;
        }
        return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
      });
    }

    function findAppById(id) {
      for (let i = 0; i < apps.length; i += 1) {
        if (apps[i].id === id) {
          return apps[i];
        }
      }
      return null;
    }

    function isLocalFileUrl(url) {
      return typeof url === 'string' && url.indexOf('file:///') === 0;
    }

    function updatePreview(app) {
      previewImage.src = app.image;
      previewImage.alt = app.title + ' のビジュアル画像';
      previewGenre.textContent = app.genre;
      previewTitle.textContent = app.title;
      previewDescription.textContent = app.shortDescription;

      if (isLocalFileUrl(app.url)) {
        openAppButton.href = '#';
        openAppButton.setAttribute('aria-disabled', 'true');
        openAppButton.style.opacity = '0.55';
        openAppButton.style.pointerEvents = 'none';
      } else {
        openAppButton.href = app.url;
        openAppButton.removeAttribute('aria-disabled');
        openAppButton.style.opacity = '1';
        openAppButton.style.pointerEvents = 'auto';
      }

      const cards = appList.querySelectorAll('.app-card');
      for (let i = 0; i < cards.length; i += 1) {
        if (cards[i].dataset.appId === app.id) {
          cards[i].classList.add('is-active');
        } else {
          cards[i].classList.remove('is-active');
        }
      }
    }

    function handleCardClick(appId) {
      selectedAppId = appId;
      const app = findAppById(appId);
      if (!app) {
        return;
      }
      updatePreview(app);
    }

    function createCard(app) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'app-card';
      button.dataset.appId = app.id;

      const imageWrap = document.createElement('div');
      imageWrap.className = 'app-card-image-wrap';

      const image = document.createElement('img');
      image.className = 'app-card-image';
      image.src = app.image;
      image.alt = app.title + ' の画像';

      const content = document.createElement('div');
      content.className = 'app-card-content';

      const meta = document.createElement('div');
      meta.className = 'app-card-meta';

      const genreSpan = document.createElement('span');
      genreSpan.textContent = app.genre;

      const title = document.createElement('h3');
      title.className = 'app-card-title';
      title.textContent = app.title;

      const description = document.createElement('p');
      description.className = 'app-card-description';
      description.textContent = app.shortDescription;

      meta.appendChild(genreSpan);
      content.appendChild(meta);
      content.appendChild(title);
      content.appendChild(description);
      imageWrap.appendChild(image);
      button.appendChild(imageWrap);
      button.appendChild(content);

      button.addEventListener('click', function() {
        handleCardClick(app.id);
      });

      return button;
    }

    function renderAppList() {
      appList.textContent = '';

      const sortedApps = sortApps(apps);

      if (sortedApps.length === 0) {
        const emptyMessage = document.createElement('div');
        emptyMessage.className = 'empty-message';
        emptyMessage.textContent = 'まだアプリが登録されていません。';
        appList.appendChild(emptyMessage);
        return;
      }

      for (let i = 0; i < sortedApps.length; i += 1) {
        appList.appendChild(createCard(sortedApps[i]));
      }

      if (!selectedAppId) {
        selectedAppId = sortedApps[0].id;
      }

      const selectedApp = findAppById(selectedAppId) || sortedApps[0];
      updatePreview(selectedApp);
    }

    renderAppList();
  </script>
</body>
</html>
