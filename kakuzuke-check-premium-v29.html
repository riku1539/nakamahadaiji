<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>オリジナル格付けチェック v29</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#0d0d0d;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
iframe{width:100%;height:100%;border:none;display:block;background:#0d0d0d}.loading{position:fixed;inset:0;display:grid;place-items:center;color:#f3d892;background:radial-gradient(circle at top,#2a2a2a 0%,#151515 35%,#0d0d0d 100%);font-weight:800;letter-spacing:.08em;z-index:10}.hidden{display:none}
</style>
</head>
<body>
<div id="loading" class="loading">読み込み中…</div>
<iframe id="outerFrame"></iframe>
<script>
const loading=document.getElementById('loading');
const outerFrame=document.getElementById('outerFrame');
outerFrame.src='./kakuzuke-check-premium-v28.html'+window.location.search;

outerFrame.addEventListener('load',()=>{
  const outerDoc=outerFrame.contentDocument;
  const innerFrame=outerDoc && outerDoc.getElementById('appFrame');
  if(!innerFrame){ loading.classList.add('hidden'); return; }

  function patchInner(){
    const doc=innerFrame.contentDocument;
    const win=innerFrame.contentWindow;
    if(!doc||!win)return;
    loading.classList.add('hidden');

    if(!doc.getElementById('v29-style')){
      const style=doc.createElement('style');
      style.id='v29-style';
      style.textContent=`
        :root{--v29-gold:rgba(255,223,127,.22);--v29-gold-strong:rgba(255,223,127,.34);--v29-panel:linear-gradient(180deg,#232323,#171717);--v29-panel-dark:linear-gradient(180deg,#171717,#0f0f0f)}
        .frame{border-width:4px !important}
        .card,.control-group,.secret-stage,.answer-name,.answer-cell,.grade-name,.grade-cell,.check-box,.host-op-band,.team-status-wait,.team-self-summary,.shared-question-note{border-color:var(--v29-gold) !important}
        .card,.control-group,.host-op-band{background:var(--v29-panel) !important}
        .secret-stage,.team-status-wait,.team-self-summary{background:var(--v29-panel-dark) !important}
        .answer-head.name,.grade-head.name,.check-box,.warning-box{background:var(--v29-panel-dark) !important}
        .answer-name,.grade-name,.answer-cell,.grade-cell{border-width:2px !important;border-radius:16px !important}
        .grade-head,.answer-head{border-radius:14px !important}
        .check-box{border-radius:14px !important}
        .check-box.current,.grade-row.focused .grade-name,.grade-row.focused .grade-cell,.answer-cell.current,.grade-cell.current{box-shadow:0 0 0 2px rgba(255,237,141,.42) !important}
        .team-tag,.ghost-tag,.void-tag{border-radius:12px !important}
        .mode-chip, .pill, .host-mini-pill, .judge-preview-pill, .chip{border-radius:999px !important}
        .help,.mini-note,.danger-note,.subtle{display:none !important}
        #shared-question-note{font-size:12px !important;line-height:1.7 !important}
      `;
      doc.head.appendChild(style);
    }

    function replaceText(node){
      if(!node) return;
      const walker=doc.createTreeWalker(node, NodeFilter.SHOW_TEXT, null);
      const targets=[];
      while(walker.nextNode()) targets.push(walker.currentNode);
      targets.forEach(t=>{
        let s=t.nodeValue;
        if(!s) return;
        s=s.replace(/チーム用試作モード/g,'チーム用画面');
        s=s.replace(/チーム用試作/g,'チーム用');
        s=s.replace(/Prototype Edition/g,'STANDARD EDITION');
        s=s.replace(/チェック開始！/g,'チェック開始');
        s=s.replace(/正解！/g,'正解');
        s=s.replace(/読み込み中…/g,'読み込み中');
        t.nodeValue=s;
      });
    }

    function adjustLabels(){
      replaceText(doc.body);

      const roleNote=doc.getElementById('role-note');
      if(roleNote){
        roleNote.innerHTML='＜基本＞ 教員用は進行と管理、表示用は会場表示、チーム用は各チームの回答確認に使用します。';
      }

      const teamPanelTitle=Array.from(doc.querySelectorAll('h3')).find(el=>el.textContent.includes('チーム用'));
      if(teamPanelTitle) teamPanelTitle.textContent='チーム用画面';

      const note=doc.getElementById('shared-question-note');
      if(note){
        note.textContent = note.classList.contains('locked')
          ? '＜基本＞ この問題は全チーム共通です。回答が始まった後の変更は次の問題から反映されます。'
          : '＜基本＞ この問題の設定は全チーム共通で使用されます。';
      }

      const progressGroup=Array.from(doc.querySelectorAll('.control-group')).find(el=>el.querySelector('h4')?.textContent.trim()==='進行');
      if(progressGroup){
        const h4=progressGroup.querySelector('h4');
        if(h4) h4.textContent='進行';
      }

      const manageGroup=Array.from(doc.querySelectorAll('.control-group')).find(el=>el.querySelector('h4')?.textContent.trim()==='管理');
      if(manageGroup){
        const h4=manageGroup.querySelector('h4');
        if(h4) h4.textContent='管理';
      }

      const startBtn=Array.from(doc.querySelectorAll('button')).find(el=>el.textContent.trim()==='チェック開始！');
      if(startBtn) startBtn.textContent='チェック開始';
    }

    function moveBasicNotes(){
      const settingsCard=doc.querySelector('#answer-screen .card.host-only');
      if(settingsCard && !doc.getElementById('basic-note-box')){
        const box=doc.createElement('div');
        box.id='basic-note-box';
        box.className='shared-question-note';
        box.textContent='＜基本＞ 問題設定は1問ごとに全チーム共通です。回答開始後は次の問題まで変更できません。';
        settingsCard.appendChild(box);
      }
    }

    function sync(){
      adjustLabels();
      moveBasicNotes();
    }

    const observer=new MutationObserver(()=>sync());
    observer.observe(doc.body,{childList:true,subtree:true,characterData:true});
    sync();
  }

  innerFrame.addEventListener('load',patchInner,{once:false});
  patchInner();
});
</script>
</body>
</html>
