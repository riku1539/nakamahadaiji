<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI秘書タスク管理</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --card-soft: #f8fafb;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dde3e8;
      --primary: #2f5d7c;
      --primary-soft: #eaf2f7;
      --danger: #b94949;
      --danger-soft: #fbeaea;
      --warning: #9a6a00;
      --warning-soft: #fff6d8;
      --future: #4b5563;
      --future-soft: #f3f4f6;
      --success: #4b7a59;
      --success-soft: #edf7f0;
      --shadow: 0 8px 24px rgba(21, 34, 50, 0.08);
      --radius-lg: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }

    body {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 14px calc(env(safe-area-inset-bottom, 0px) + 18px);
    }

    .app {
      max-width: 620px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 14px;
      padding: 6px 4px 2px;
    }

    .header-title {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.3;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .header-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(221, 227, 232, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .input-panel {
      padding: 14px;
      margin-bottom: 14px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .voice-button,
    .add-button,
    .icon-button,
    .tab-button,
    .filter-button {
      appearance: none;
      border: none;
      background: none;
      font: inherit;
      cursor: pointer;
    }

    .voice-button {
      width: 48px;
      min-width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--card-soft);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 1.1rem;
    }

    .voice-button:active,
    .add-button:active,
    .icon-button:active,
    .tab-button:active,
    .filter-button:active {
      transform: scale(0.98);
    }

    .task-input {
      flex: 1;
      min-width: 0;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 14px;
      font-size: 1rem;
      color: var(--text);
      outline: none;
    }

    .task-input::placeholder {
      color: #9aa4b2;
    }

    .task-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47, 93, 124, 0.12);
    }

    .add-button {
      min-width: 72px;
      height: 48px;
      padding: 0 16px;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .helper-text {
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .tabs-panel {
      padding: 8px;
      margin-bottom: 12px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tab-button {
      height: 46px;
      border-radius: 14px;
      font-weight: 700;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
    }

    .tab-button.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: rgba(47, 93, 124, 0.16);
    }

    .list-panel {
      padding: 12px;
    }

    .list-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      padding: 2px 2px 0;
    }

    .list-title-wrap {
      min-width: 0;
    }

    .list-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .list-note {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .filter-button {
      flex-shrink: 0;
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .filter-button.active {
      background: var(--success-soft);
      color: var(--success);
      border-color: rgba(75, 122, 89, 0.22);
    }

    .task-list {
      display: grid;
      gap: 10px;
    }

    .task-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .task-item.completed {
      background: #f8fbf9;
      border-color: #dce9df;
    }

    .task-item.overdue {
      background: var(--danger-soft);
      border-color: rgba(185, 73, 73, 0.25);
    }

    .task-item.soon {
      background: var(--warning-soft);
      border-color: rgba(154, 106, 0, 0.22);
    }

    .task-item.future-muted {
      background: var(--future-soft);
      border-color: #e5e7eb;
    }

    .check-button {
      width: 28px;
      height: 28px;
      margin-top: 2px;
      border-radius: 999px;
      border: 2px solid #b8c3ce;
      background: #fff;
      position: relative;
      cursor: pointer;
      appearance: none;
      padding: 0;
      flex-shrink: 0;
    }

    .task-item.completed .check-button {
      border-color: var(--success);
      background: var(--success);
    }

    .task-item.completed .check-button::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 4px;
      width: 7px;
      height: 13px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .task-body {
      min-width: 0;
    }

    .task-title {
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.5;
      font-weight: 700;
      word-break: break-word;
    }

    .task-item.completed .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-item.future-muted .task-title,
    .task-item.future-muted .pill,
    .task-item.future-muted .icon-button {
      color: var(--future);
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .pill.deadline {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .task-item.overdue .pill.deadline {
      background: rgba(185, 73, 73, 0.12);
      color: var(--danger);
    }

    .task-item.soon .pill.deadline {
      background: rgba(154, 106, 0, 0.12);
      color: var(--warning);
    }

    .task-item.future-muted .pill.deadline {
      background: #eceff3;
      color: var(--future);
    }

    .pill.created {
      background: #f2f4f7;
      color: var(--muted);
    }

    .pill.done {
      background: var(--success-soft);
      color: var(--success);
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .icon-button.delete {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: rgba(185, 73, 73, 0.14);
    }

    .empty-state {
      padding: 28px 16px;
      border-radius: 16px;
      background: #fbfcfd;
      border: 1px dashed #cfd7de;
      text-align: center;
    }

    .empty-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .empty-text {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 18px);
      transform: translateX(-50%) translateY(10px);
      width: calc(100% - 28px);
      max-width: 520px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(31, 41, 55, 0.96);
      color: #fff;
      font-size: 0.9rem;
      line-height: 1.45;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 640px) {
      body {
        padding-left: 18px;
        padding-right: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">AI秘書タスク管理</h1>
      <p class="header-subtitle">思いついたら、すぐ1行で追加。漏れと遅れを防ぐための最小構成です。</p>
    </header>

    <section class="panel input-panel" aria-label="タスク入力">
      <div class="input-row">
        <button type="button" class="voice-button" id="voiceButton" aria-label="音声入力（ダミー）" title="音声入力（ダミー）">🎤</button>
        <input id="taskInput" class="task-input" type="text" inputmode="text" enterkeyhint="done" placeholder="例：2限日本史 / 11時半に生徒来室 / 今日10時会議" aria-label="タスク入力" maxlength="200" />
        <button type="button" class="add-button" id="addButton">追加</button>
      </div>
      <p class="helper-text">期限があるものは「期限あり」、それ以外は「期限なし」に自動で分かれます。時間だけある入力は今日の予定として扱います。</p>
    </section>

    <section class="panel tabs-panel" aria-label="タブ切り替え">
      <div class="tabs" role="tablist" aria-label="タスク分類">
        <button type="button" class="tab-button active" id="tabDeadline" data-tab="deadline" role="tab" aria-selected="true">期限あり</button>
        <button type="button" class="tab-button" id="tabNoDeadline" data-tab="noDeadline" role="tab" aria-selected="false">期限なし</button>
      </div>
    </section>

    <section class="panel list-panel">
      <div class="list-topbar">
        <div class="list-title-wrap">
          <h2 class="list-title" id="listTitle">期限ありのタスク</h2>
          <p class="list-note" id="listNote">期限が近い順に表示します。</p>
        </div>
        <button type="button" class="filter-button" id="toggleCompletedButton">完了を隠す</button>
      </div>
      <div class="task-list" id="taskList" aria-live="polite"></div>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="assertive"></div>

  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "teacher_ai_secretary_tasks_v1";
      var PERIOD_SCHEDULE = {
        1: { hour: 10, minute: 0 },
        2: { hour: 11, minute: 0 },
        3: { hour: 12, minute: 0 },
        4: { hour: 13, minute: 30 },
        5: { hour: 14, minute: 30 },
        6: { hour: 15, minute: 30 },
        7: { hour: 16, minute: 30 },
        8: { hour: 17, minute: 30 }
      };

      var state = {
        tasks: [],
        currentTab: "deadline",
        hideCompleted: false
      };

      var taskInput = document.getElementById("taskInput");
      var addButton = document.getElementById("addButton");
      var voiceButton = document.getElementById("voiceButton");
      var tabDeadline = document.getElementById("tabDeadline");
      var tabNoDeadline = document.getElementById("tabNoDeadline");
      var taskList = document.getElementById("taskList");
      var listTitle = document.getElementById("listTitle");
      var listNote = document.getElementById("listNote");
      var toggleCompletedButton = document.getElementById("toggleCompletedButton");
      var toast = document.getElementById("toast");

      function generateId() {
        return "task_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9);
      }

      function startOfToday() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      }

      function startOfTomorrow() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime();
      }

      function endOfToday() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999).getTime();
      }

      function endOfTomorrow() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 23, 59, 59, 999).getTime();
      }

      function endOfThisWeek() {
        var now = new Date();
        var day = now.getDay();
        var diffToSunday = 7 - day;
        return new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToSunday, 23, 59, 59, 999).getTime();
      }

      function endOfThisMonth() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999).getTime();
      }

      function formatClockTime(hour, minute) {
        return String(hour).padStart(2, "0") + ":" + String(minute).padStart(2, "0");
      }

      function formatJapaneseTime(hour, minute) {
        if (minute === 0) {
          return hour + "時";
        }
        if (minute === 30) {
          return hour + "時半";
        }
        return hour + "時" + String(minute).padStart(2, "0") + "分";
      }

      function formatMonthDay(month, day) {
        return month + "/" + day;
      }

      function buildTimestamp(year, month, day, hour, minute) {
        return new Date(year, month - 1, day, hour, minute, 0, 0).getTime();
      }

      function parseMonthDayToTimestamp(month, day) {
        var now = new Date();
        var year = now.getFullYear();
        var candidate = new Date(year, month - 1, day, 23, 59, 59, 999);

        if (candidate.getTime() < startOfToday()) {
          candidate = new Date(year + 1, month - 1, day, 23, 59, 59, 999);
        }

        return candidate.getTime();
      }

      function sanitizeText(text) {
        return String(text || "").replace(/\s+/g, " ").replace(/　+/g, " ").trim();
      }

      function adjustAmbiguousWorkTime(hour, minute, hasMeridiem) {
        if (hasMeridiem) {
          return { hour: hour, minute: minute };
        }

        if (hour < 7 || (hour === 7 && minute < 30)) {
          return { hour: hour + 12, minute: minute };
        }

        return { hour: hour, minute: minute };
      }

      function extractTimeInfo(text) {
        var match;
        var meridiem = "";
        var hour = null;
        var minute = 0;
        var adjusted;

        match = text.match(/(午前|午後)?\s*(\d{1,2})\s*:\s*(\d{1,2})/);
        if (match) {
          meridiem = match[1] || "";
          hour = Number(match[2]);
          minute = Number(match[3]);
        }

        if (hour === null) {
          match = text.match(/(午前|午後)?\s*(\d{1,2})時\s*(\d{1,2})分/);
          if (match) {
            meridiem = match[1] || "";
            hour = Number(match[2]);
            minute = Number(match[3]);
          }
        }

        if (hour === null) {
          match = text.match(/(午前|午後)?\s*(\d{1,2})時半/);
          if (match) {
            meridiem = match[1] || "";
            hour = Number(match[2]);
            minute = 30;
          }
        }

        if (hour === null) {
          match = text.match(/(午前|午後)?\s*(\d{1,2})時/);
          if (match) {
            meridiem = match[1] || "";
            hour = Number(match[2]);
            minute = 0;
          }
        }

        if (hour === null) {
          return null;
        }

        if (meridiem === "午後" && hour < 12) {
          hour += 12;
        }
        if (meridiem === "午前" && hour === 12) {
          hour = 0;
        }

        adjusted = adjustAmbiguousWorkTime(hour, minute, meridiem !== "");
        hour = adjusted.hour;
        minute = adjusted.minute;

        if (hour > 23 || minute > 59) {
          return null;
        }

        return {
          hour: hour,
          minute: minute,
          text: formatClockTime(hour, minute)
        };
      }

      function extractPeriodInfo(text) {
        var match = text.match(/^(\d(?:[\.・、,]\d+)*)限/);
        var raw;
        var parts;
        var first;
        var last;
        var firstSchedule;
        var lastSchedule;
        var endDate;

        if (!match) {
          return null;
        }

        raw = match[1];
        parts = raw.split(/[\.・、,]/).map(function (item) {
          return Number(item);
        }).filter(function (item) {
          return PERIOD_SCHEDULE[item];
        });

        if (parts.length === 0) {
          return null;
        }

        first = parts[0];
        last = parts[parts.length - 1];
        firstSchedule = PERIOD_SCHEDULE[first];
        lastSchedule = PERIOD_SCHEDULE[last];
        endDate = new Date(2000, 0, 1, lastSchedule.hour, lastSchedule.minute + 50, 0, 0);

        return {
          label: raw + "限",
          firstPeriod: first,
          lastPeriod: last,
          startHour: firstSchedule.hour,
          startMinute: firstSchedule.minute,
          endHour: endDate.getHours(),
          endMinute: endDate.getMinutes(),
          display: raw + "限［" + formatJapaneseTime(firstSchedule.hour, firstSchedule.minute) + "〜" + formatJapaneseTime(endDate.getHours(), endDate.getMinutes()) + "］"
        };
      }

      function removeLeadingDateTimeAndPeriod(text) {
        var title = text;

        title = title.replace(/^(今日中|今日まで|今日|明日まで|明日中|明日|今週中|今週|今月中|今月)\s*/i, "");
        title = title.replace(/^(\d{1,2})\s*\/\s*(\d{1,2})\s*/i, "");
        title = title.replace(/^(\d{1,2})月(\d{1,2})日\s*/i, "");
        title = title.replace(/^(\d{1,2})日\s*(までに|まで|〆切|締切)?\s*/i, "");
        title = title.replace(/^(締切|〆切)\s*/i, "");
        title = title.replace(/^(\d(?:[\.・、,]\d+)*)限\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}\s*:\s*\d{1,2}\s*(に|から)?\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}時\s*\d{1,2}分\s*(に|から)?\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}時半\s*(に|から)?\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}時\s*(に|から)?\s*/i, "");
        title = title.replace(/^までに\s*/i, "");
        title = title.replace(/^に\s*/i, "");
        title = title.replace(/^へ\s*/i, "");
        title = title.replace(/\s+/g, " ").trim();

        return title;
      }

      function cleanTitleFromDeadlineWords(text) {
        var title = removeLeadingDateTimeAndPeriod(text);

        title = title.replace(/\s*(を|の)?\s*までに$/, "");
        title = title.replace(/\s*(今日中|今日|明日まで|明日中|明日|今週中|今週|今月中|今月|締切|〆切)\s*$/, "");
        title = title.replace(/\s+/g, " ").trim();

        if (!title) {
          title = text;
        }

        return title;
      }

      function parseTask(rawText) {
        var text = sanitizeText(rawText);
        var hasDeadline = false;
        var deadlineText = "";
        var deadlineTimestamp = null;
        var title = text;
        var now = new Date();
        var timeInfo = extractTimeInfo(text);
        var periodInfo = extractPeriodInfo(text);
        var targetYear = now.getFullYear();
        var targetMonth = now.getMonth() + 1;
        var targetDay = now.getDate();
        var monthDaySlashMatch;
        var monthDayKanjiMatch;
        var dayOnlyMatch;
        var candidate;
        var explicitDateLabel = "";
        var todayLabel = formatMonthDay(now.getMonth() + 1, now.getDate());
        var tomorrowDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        var tomorrowLabel = formatMonthDay(tomorrowDate.getMonth() + 1, tomorrowDate.getDate());

        if (!text) {
          return null;
        }

        monthDaySlashMatch = text.match(/(\d{1,2})\s*\/\s*(\d{1,2})\s*(まで|までに|〆切|締切)?/);
        monthDayKanjiMatch = text.match(/(\d{1,2})月(\d{1,2})日\s*(まで|までに|〆切|締切)?/);
        dayOnlyMatch = text.match(/(\d{1,2})日\s*(まで|までに|〆切|締切)/);

        if (monthDaySlashMatch) {
          targetMonth = Number(monthDaySlashMatch[1]);
          targetDay = Number(monthDaySlashMatch[2]);
          candidate = new Date(targetYear, targetMonth - 1, targetDay, 23, 59, 59, 999);
          if (candidate.getTime() < startOfToday()) {
            targetYear += 1;
          }
          explicitDateLabel = targetMonth + "/" + targetDay;
        } else if (monthDayKanjiMatch) {
          targetMonth = Number(monthDayKanjiMatch[1]);
          targetDay = Number(monthDayKanjiMatch[2]);
          candidate = new Date(targetYear, targetMonth - 1, targetDay, 23, 59, 59, 999);
          if (candidate.getTime() < startOfToday()) {
            targetYear += 1;
          }
          explicitDateLabel = targetMonth + "/" + targetDay;
        } else if (dayOnlyMatch) {
          targetDay = Number(dayOnlyMatch[1]);
          candidate = new Date(targetYear, targetMonth - 1, targetDay, 23, 59, 59, 999);
          if (candidate.getTime() < startOfToday()) {
            candidate = new Date(targetYear, targetMonth, targetDay, 23, 59, 59, 999);
            targetYear = candidate.getFullYear();
            targetMonth = candidate.getMonth() + 1;
            targetDay = candidate.getDate();
          }
          explicitDateLabel = targetMonth + "/" + targetDay;
        }

        if (/今日中|今日まで|今日\b/.test(text)) {
          hasDeadline = true;
          if (periodInfo) {
            deadlineText = todayLabel + " " + periodInfo.display;
            deadlineTimestamp = buildTimestamp(now.getFullYear(), now.getMonth() + 1, now.getDate(), periodInfo.startHour, periodInfo.startMinute);
          } else if (timeInfo) {
            deadlineText = todayLabel + " " + timeInfo.text;
            deadlineTimestamp = buildTimestamp(now.getFullYear(), now.getMonth() + 1, now.getDate(), timeInfo.hour, timeInfo.minute);
          } else {
            deadlineText = todayLabel + " 今日中";
            deadlineTimestamp = endOfToday();
          }
        } else if (/明日まで|明日中|明日\b/.test(text)) {
          hasDeadline = true;
          if (periodInfo) {
            deadlineText = tomorrowLabel + " " + periodInfo.display;
            deadlineTimestamp = buildTimestamp(tomorrowDate.getFullYear(), tomorrowDate.getMonth() + 1, tomorrowDate.getDate(), periodInfo.startHour, periodInfo.startMinute);
          } else if (timeInfo) {
            deadlineText = tomorrowLabel + " " + timeInfo.text;
            deadlineTimestamp = buildTimestamp(tomorrowDate.getFullYear(), tomorrowDate.getMonth() + 1, tomorrowDate.getDate(), timeInfo.hour, timeInfo.minute);
          } else {
            deadlineText = tomorrowLabel + " まで";
            deadlineTimestamp = endOfTomorrow();
          }
        } else if (/今週中|今週まで|今週\b/.test(text)) {
          hasDeadline = true;
          if (periodInfo) {
            var weekDay = now.getDay();
            var diffToSunday = 7 - weekDay;
            var weekEndDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToSunday);
            deadlineText = formatMonthDay(weekEndDate.getMonth() + 1, weekEndDate.getDate()) + " " + periodInfo.display;
            deadlineTimestamp = buildTimestamp(weekEndDate.getFullYear(), weekEndDate.getMonth() + 1, weekEndDate.getDate(), periodInfo.startHour, periodInfo.startMinute);
          } else if (timeInfo) {
            var weekDay2 = now.getDay();
            var diffToSunday2 = 7 - weekDay2;
            var weekEndDate2 = new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToSunday2);
            deadlineText = formatMonthDay(weekEndDate2.getMonth() + 1, weekEndDate2.getDate()) + " " + timeInfo.text;
            deadlineTimestamp = buildTimestamp(weekEndDate2.getFullYear(), weekEndDate2.getMonth() + 1, weekEndDate2.getDate(), timeInfo.hour, timeInfo.minute);
          } else {
            deadlineText = "今週中";
            deadlineTimestamp = endOfThisWeek();
          }
        } else if (/今月中|今月まで|今月\b/.test(text)) {
          hasDeadline = true;
          if (periodInfo) {
            var monthEndDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            deadlineText = formatMonthDay(monthEndDate.getMonth() + 1, monthEndDate.getDate()) + " " + periodInfo.display;
            deadlineTimestamp = buildTimestamp(monthEndDate.getFullYear(), monthEndDate.getMonth() + 1, monthEndDate.getDate(), periodInfo.startHour, periodInfo.startMinute);
          } else if (timeInfo) {
            var monthEndDate2 = new Date(now.getFullYear(), now.getMonth() + 1, 0);
            deadlineText = formatMonthDay(monthEndDate2.getMonth() + 1, monthEndDate2.getDate()) + " " + timeInfo.text;
            deadlineTimestamp = buildTimestamp(monthEndDate2.getFullYear(), monthEndDate2.getMonth() + 1, monthEndDate2.getDate(), timeInfo.hour, timeInfo.minute);
          } else {
            deadlineText = "今月中";
            deadlineTimestamp = endOfThisMonth();
          }
        } else if (monthDaySlashMatch || monthDayKanjiMatch || dayOnlyMatch) {
          hasDeadline = true;
          if (periodInfo) {
            deadlineText = explicitDateLabel + " " + periodInfo.display;
            deadlineTimestamp = buildTimestamp(targetYear, targetMonth, targetDay, periodInfo.startHour, periodInfo.startMinute);
          } else if (timeInfo) {
            deadlineText = explicitDateLabel + " " + timeInfo.text;
            deadlineTimestamp = buildTimestamp(targetYear, targetMonth, targetDay, timeInfo.hour, timeInfo.minute);
          } else {
            deadlineText = explicitDateLabel + " まで";
            deadlineTimestamp = parseMonthDayToTimestamp(targetMonth, targetDay);
          }
        } else if (/締切|〆切/.test(text)) {
          hasDeadline = true;
          if (periodInfo) {
            deadlineText = todayLabel + " " + periodInfo.display;
            deadlineTimestamp = buildTimestamp(now.getFullYear(), now.getMonth() + 1, now.getDate(), periodInfo.startHour, periodInfo.startMinute);
          } else if (timeInfo) {
            deadlineText = todayLabel + " " + timeInfo.text;
            deadlineTimestamp = buildTimestamp(now.getFullYear(), now.getMonth() + 1, now.getDate(), timeInfo.hour, timeInfo.minute);
          } else {
            deadlineText = "締切あり";
            deadlineTimestamp = Date.now() + (1000 * 60 * 60 * 24 * 7);
          }
        } else if (periodInfo) {
          hasDeadline = true;
          deadlineText = todayLabel + " " + periodInfo.display;
          deadlineTimestamp = buildTimestamp(now.getFullYear(), now.getMonth() + 1, now.getDate(), periodInfo.startHour, periodInfo.startMinute);
        } else if (timeInfo) {
          hasDeadline = true;
          deadlineText = todayLabel + " " + timeInfo.text;
          deadlineTimestamp = buildTimestamp(now.getFullYear(), now.getMonth() + 1, now.getDate(), timeInfo.hour, timeInfo.minute);
        }

        title = cleanTitleFromDeadlineWords(text);

        return {
          id: generateId(),
          rawText: text,
          title: title,
          hasDeadline: hasDeadline,
          deadlineText: deadlineText,
          deadlineTimestamp: hasDeadline ? deadlineTimestamp : null,
          completed: false,
          createdAt: Date.now()
        };
      }

      function saveTasks(tasks) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        } catch (error) {
          showToast("保存に失敗しました。ブラウザの空き容量をご確認ください。");
        }
      }

      function loadTasks() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) {
            return [];
          }

          var parsed = JSON.parse(saved);
          if (!Array.isArray(parsed)) {
            return [];
          }

          return parsed.filter(function (task) {
            return task && typeof task === "object" && typeof task.id === "string";
          });
        } catch (error) {
          return [];
        }
      }

      function formatCreatedAt(timestamp) {
        var date = new Date(timestamp);
        var month = date.getMonth() + 1;
        var day = date.getDate();
        var hours = String(date.getHours()).padStart(2, "0");
        var minutes = String(date.getMinutes()).padStart(2, "0");
        return month + "/" + day + " " + hours + ":" + minutes;
      }

      function sortTasks(tasks, tab) {
        var copied = tasks.slice();

        if (tab === "deadline") {
          copied.sort(function (a, b) {
            if (a.completed !== b.completed) {
              return Number(a.completed) - Number(b.completed);
            }
            var aTime = typeof a.deadlineTimestamp === "number" ? a.deadlineTimestamp : Number.MAX_SAFE_INTEGER;
            var bTime = typeof b.deadlineTimestamp === "number" ? b.deadlineTimestamp : Number.MAX_SAFE_INTEGER;
            if (aTime !== bTime) {
              return aTime - bTime;
            }
            return b.createdAt - a.createdAt;
          });
        } else {
          copied.sort(function (a, b) {
            if (a.completed !== b.completed) {
              return Number(a.completed) - Number(b.completed);
            }
            return b.createdAt - a.createdAt;
          });
        }

        return copied;
      }

      function getFilteredTasks() {
        var filtered = state.tasks.filter(function (task) {
          var matchesTab = state.currentTab === "deadline" ? task.hasDeadline : !task.hasDeadline;
          var matchesCompleted = state.hideCompleted ? !task.completed : true;
          return matchesTab && matchesCompleted;
        });

        return sortTasks(filtered, state.currentTab);
      }

      function getTaskUrgencyClass(task) {
        var now = Date.now();
        var tenMinutesLater = now + (10 * 60 * 1000);

        if (!task.hasDeadline || task.completed || typeof task.deadlineTimestamp !== "number") {
          return "";
        }

        if (task.deadlineTimestamp < now) {
          return "overdue";
        }

        if (task.deadlineTimestamp <= tenMinutesLater) {
          return "soon";
        }

        if (task.deadlineTimestamp >= startOfTomorrow()) {
          return "future-muted";
        }

        return "";
      }

      function createTaskItem(task) {
        var urgencyClass = getTaskUrgencyClass(task);
        var article = document.createElement("article");
        article.className = "task-item" + (task.completed ? " completed" : "") + (urgencyClass ? " " + urgencyClass : "");
        article.setAttribute("data-id", task.id);

        var checkButton = document.createElement("button");
        checkButton.type = "button";
        checkButton.className = "check-button";
        checkButton.setAttribute("aria-label", task.completed ? "未完了に戻す" : "完了にする");
        checkButton.addEventListener("click", function () {
          toggleTaskComplete(task.id);
        });

        var body = document.createElement("div");
        body.className = "task-body";

        var title = document.createElement("p");
        title.className = "task-title";
        title.textContent = task.title;

        var meta = document.createElement("div");
        meta.className = "task-meta";

        if (task.hasDeadline && task.deadlineText) {
          var deadlinePill = document.createElement("span");
          deadlinePill.className = "pill deadline";
          deadlinePill.textContent = "期限：" + task.deadlineText;
          meta.appendChild(deadlinePill);
        }

        if (!task.hasDeadline) {
          var createdPill = document.createElement("span");
          createdPill.className = "pill created";
          createdPill.textContent = "追加：" + formatCreatedAt(task.createdAt);
          meta.appendChild(createdPill);
        }

        if (task.completed) {
          var donePill = document.createElement("span");
          donePill.className = "pill done";
          donePill.textContent = "完了";
          meta.appendChild(donePill);
        }

        body.appendChild(title);
        body.appendChild(meta);

        var actions = document.createElement("div");
        actions.className = "task-actions";

        var deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "icon-button delete";
        deleteButton.setAttribute("aria-label", "削除");
        deleteButton.textContent = "🗑";
        deleteButton.addEventListener("click", function () {
          deleteTask(task.id);
        });

        actions.appendChild(deleteButton);

        article.appendChild(checkButton);
        article.appendChild(body);
        article.appendChild(actions);

        return article;
      }

      function createEmptyState() {
        var wrapper = document.createElement("div");
        wrapper.className = "empty-state";

        var title = document.createElement("p");
        title.className = "empty-title";
        title.textContent = state.currentTab === "deadline" ? "期限ありのタスクはありません" : "期限なしのタスクはありません";

        var text = document.createElement("p");
        text.className = "empty-text";

        if (state.currentTab === "deadline") {
          text.textContent = "例：2限日本史 / 5.6限体育 / 明日10時会議";
        } else {
          text.textContent = "例：図書室で新しい参考書を探す";
        }

        wrapper.appendChild(title);
        wrapper.appendChild(text);

        return wrapper;
      }

      function renderTasks() {
        var tasksToRender = getFilteredTasks();

        listTitle.textContent = state.currentTab === "deadline" ? "期限ありのタスク" : "期限なしのタスク";
        listNote.textContent = state.currentTab === "deadline" ? "期限が近い順に表示します。" : "思いついた順に整理します。";

        toggleCompletedButton.textContent = state.hideCompleted ? "完了を表示" : "完了を隠す";
        toggleCompletedButton.classList.toggle("active", state.hideCompleted);

        tabDeadline.classList.toggle("active", state.currentTab === "deadline");
        tabDeadline.setAttribute("aria-selected", state.currentTab === "deadline" ? "true" : "false");
        tabNoDeadline.classList.toggle("active", state.currentTab === "noDeadline");
        tabNoDeadline.setAttribute("aria-selected", state.currentTab === "noDeadline" ? "true" : "false");

        taskList.innerHTML = "";

        if (tasksToRender.length === 0) {
          taskList.appendChild(createEmptyState());
          return;
        }

        tasksToRender.forEach(function (task) {
          taskList.appendChild(createTaskItem(task));
        });
      }

      function addTask() {
        var inputText = sanitizeText(taskInput.value);

        if (!inputText) {
          showToast("タスク内容を入力してください。");
          taskInput.focus();
          return;
        }

        var parsedTask = parseTask(inputText);

        if (!parsedTask) {
          showToast("タスクを追加できませんでした。");
          return;
        }

        state.tasks.unshift(parsedTask);
        saveTasks(state.tasks);
        taskInput.value = "";

        if (parsedTask.hasDeadline) {
          state.currentTab = "deadline";
        } else {
          state.currentTab = "noDeadline";
        }

        renderTasks();
        taskInput.focus();
      }

      function toggleTaskComplete(taskId) {
        state.tasks = state.tasks.map(function (task) {
          if (task.id === taskId) {
            return {
              id: task.id,
              rawText: task.rawText,
              title: task.title,
              hasDeadline: task.hasDeadline,
              deadlineText: task.deadlineText,
              deadlineTimestamp: task.deadlineTimestamp,
              completed: !task.completed,
              createdAt: task.createdAt
            };
          }
          return task;
        });

        saveTasks(state.tasks);
        renderTasks();
      }

      function deleteTask(taskId) {
        state.tasks = state.tasks.filter(function (task) {
          return task.id !== taskId;
        });

        saveTasks(state.tasks);
        renderTasks();
      }

      function switchTab(tabName) {
        state.currentTab = tabName;
        renderTasks();
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");

        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () {
          toast.classList.remove("show");
        }, 1800);
      }

      function handleVoiceDummy() {
        showToast("音声入力は今後追加予定です。");
      }

      function bindEvents() {
        addButton.addEventListener("click", addTask);

        taskInput.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            addTask();
          }
        });

        voiceButton.addEventListener("click", handleVoiceDummy);
        tabDeadline.addEventListener("click", function () { switchTab("deadline"); });
        tabNoDeadline.addEventListener("click", function () { switchTab("noDeadline"); });
        toggleCompletedButton.addEventListener("click", function () {
          state.hideCompleted = !state.hideCompleted;
          renderTasks();
        });
      }

      function init() {
        state.tasks = loadTasks();
        bindEvents();
        renderTasks();
      }

      init();
    })();
  </script>
</body>
</html>
