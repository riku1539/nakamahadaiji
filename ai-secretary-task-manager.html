<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AI秘書タスク管理</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --card-soft: #f8fafb;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dde3e8;
      --primary: #2f5d7c;
      --primary-soft: #eaf2f7;
      --danger: #b94949;
      --danger-soft: #fbeaea;
      --warning: #9a6a00;
      --warning-soft: #fff6d8;
      --future: #4b5563;
      --future-soft: #f3f4f6;
      --success: #4b7a59;
      --success-soft: #edf7f0;
      --tag-soft: #eef2ff;
      --tag-text: #4f46e5;
      --shadow: 0 8px 24px rgba(21, 34, 50, 0.08);
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    body {
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 14px calc(env(safe-area-inset-bottom, 0px) + 18px);
    }
    .app { max-width: 620px; margin: 0 auto; }
    .header { margin-bottom: 14px; padding: 6px 4px 2px; }
    .header-title { margin: 0; font-size: 1.35rem; line-height: 1.3; letter-spacing: 0.02em; font-weight: 700; }
    .header-subtitle { margin: 6px 0 0; color: var(--muted); font-size: 0.94rem; line-height: 1.5; }
    .panel {
      background: var(--card);
      border: 1px solid rgba(221, 227, 232, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }
    .summary-panel, .input-panel, .tabs-panel, .list-panel { margin-bottom: 14px; }
    .summary-panel { padding: 14px; }
    .summary-grid { display: grid; gap: 10px; }
    .summary-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: var(--card-soft);
    }
    .summary-kicker { font-size: 0.78rem; color: var(--muted); font-weight: 700; margin: 0 0 6px; }
    .summary-title { margin: 0; font-size: 1rem; line-height: 1.45; font-weight: 700; }
    .summary-text { margin: 6px 0 0; color: var(--muted); font-size: 0.88rem; line-height: 1.5; }
    .summary-card.alert { background: #fff8f8; border-color: rgba(185,73,73,0.18); }
    .summary-card.next { background: #f7fbff; border-color: rgba(47,93,124,0.18); }
    .summary-card.assistant { background: #fafbfc; }
    .input-panel { padding: 14px; }
    .input-row { display: flex; gap: 10px; align-items: stretch; }
    .voice-button, .add-button, .icon-button, .tab-button, .filter-button {
      appearance: none; border: none; background: none; font: inherit; cursor: pointer;
    }
    .voice-button {
      width: 48px; min-width: 48px; height: 48px; border-radius: 14px; background: var(--card-soft); border: 1px solid var(--line);
      display: inline-flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1.1rem;
    }
    .voice-button:active, .add-button:active, .icon-button:active, .tab-button:active, .filter-button:active { transform: scale(0.98); }
    .task-input {
      flex: 1; min-width: 0; height: 48px; border-radius: 14px; border: 1px solid var(--line); background: #fff;
      padding: 0 14px; font-size: 1rem; color: var(--text); outline: none;
    }
    .task-input::placeholder { color: #9aa4b2; }
    .task-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(47, 93, 124, 0.12); }
    .add-button {
      min-width: 72px; height: 48px; padding: 0 16px; border-radius: 14px; background: var(--primary); color: #fff; font-weight: 700; letter-spacing: 0.02em;
    }
    .helper-text { margin: 10px 2px 0; color: var(--muted); font-size: 0.84rem; line-height: 1.55; }
    .tabs-panel { padding: 8px; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tab-button {
      height: 46px; border-radius: 14px; font-weight: 700; color: var(--muted); background: transparent; border: 1px solid transparent;
    }
    .tab-button.active { background: var(--primary-soft); color: var(--primary); border-color: rgba(47, 93, 124, 0.16); }
    .list-panel { padding: 12px; }
    .list-topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; padding: 2px 2px 0; }
    .list-title-wrap { min-width: 0; }
    .list-title { margin: 0; font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .list-note { margin: 4px 0 0; color: var(--muted); font-size: 0.82rem; line-height: 1.4; }
    .filter-button {
      flex-shrink: 0; padding: 9px 12px; border-radius: 12px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-size: 0.86rem; font-weight: 600; white-space: nowrap;
    }
    .filter-button.active { background: var(--success-soft); color: var(--success); border-color: rgba(75, 122, 89, 0.22); }
    .task-list { display: grid; gap: 12px; }
    .section-block { display: grid; gap: 10px; }
    .section-title { margin: 4px 4px 0; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
    .task-item {
      background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 12px; display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: start;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .task-item.completed { background: #f8fbf9; border-color: #dce9df; }
    .task-item.overdue { background: var(--danger-soft); border-color: rgba(185,73,73,0.25); }
    .task-item.soon { background: var(--warning-soft); border-color: rgba(154,106,0,0.22); }
    .task-item.future-muted { background: var(--future-soft); border-color: #e5e7eb; }
    .task-item.waiting { border-left: 5px solid #7c8aa5; }
    .check-button {
      width: 28px; height: 28px; margin-top: 2px; border-radius: 999px; border: 2px solid #b8c3ce; background: #fff; position: relative; cursor: pointer; appearance: none; padding: 0; flex-shrink: 0;
    }
    .task-item.completed .check-button { border-color: var(--success); background: var(--success); }
    .task-item.completed .check-button::after {
      content: ""; position: absolute; left: 8px; top: 4px; width: 7px; height: 13px; border: solid #fff; border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
    .task-body { min-width: 0; }
    .task-title { margin: 0; font-size: 0.98rem; line-height: 1.5; font-weight: 700; word-break: break-word; }
    .task-item.completed .task-title { color: var(--muted); text-decoration: line-through; }
    .task-item.future-muted .task-title, .task-item.future-muted .pill, .task-item.future-muted .icon-button { color: var(--future); }
    .task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .pill {
      display: inline-flex; align-items: center; min-height: 28px; padding: 4px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; line-height: 1.2;
    }
    .pill.deadline { background: var(--primary-soft); color: var(--primary); }
    .pill.tag { background: var(--tag-soft); color: var(--tag-text); }
    .pill.waiting { background: #eef2f7; color: #51607c; }
    .pill.estimate { background: #f3f4f6; color: var(--muted); }
    .task-item.overdue .pill.deadline { background: rgba(185,73,73,0.12); color: var(--danger); }
    .task-item.soon .pill.deadline { background: rgba(154,106,0,0.12); color: var(--warning); }
    .task-item.future-muted .pill.deadline { background: #eceff3; color: var(--future); }
    .pill.created { background: #f2f4f7; color: var(--muted); }
    .pill.done { background: var(--success-soft); color: var(--success); }
    .task-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-top: 1px; }
    .icon-button {
      width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--line); background: #fff; color: var(--muted); display: inline-flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .icon-button.delete { color: var(--danger); background: var(--danger-soft); border-color: rgba(185,73,73,0.14); }
    .empty-state { padding: 28px 16px; border-radius: 16px; background: #fbfcfd; border: 1px dashed #cfd7de; text-align: center; }
    .empty-title { margin: 0; font-size: 1rem; font-weight: 700; line-height: 1.4; }
    .empty-text { margin: 8px 0 0; color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
    .toast {
      position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom, 0px) + 18px); transform: translateX(-50%) translateY(10px); width: calc(100% - 28px); max-width: 520px;
      padding: 12px 14px; border-radius: 14px; background: rgba(31, 41, 55, 0.96); color: #fff; font-size: 0.9rem; line-height: 1.45; opacity: 0; pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (min-width: 640px) {
      body { padding-left: 18px; padding-right: 18px; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .summary-card.assistant { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">AI秘書タスク管理</h1>
      <p class="header-subtitle">思いついたら、すぐ1行で追加。漏れと遅れを防ぐための最小構成です。</p>
    </header>

    <section class="panel summary-panel" aria-label="秘書サマリー">
      <div class="summary-grid">
        <div class="summary-card alert">
          <p class="summary-kicker">見落とし防止</p>
          <p class="summary-title" id="alertTitle">未完了の注意事項はありません</p>
          <p class="summary-text" id="alertText">期限切れや直前タスクがここにまとまります。</p>
        </div>
        <div class="summary-card next">
          <p class="summary-kicker">次にやること</p>
          <p class="summary-title" id="nextTitle">今すぐの予定はありません</p>
          <p class="summary-text" id="nextText">近い予定や、空き時間に進めやすいタスクを出します。</p>
        </div>
        <div class="summary-card assistant">
          <p class="summary-kicker">秘書コメント</p>
          <p class="summary-text" id="assistantText">予定と未完了を見ながら、次の動きを短く提案します。</p>
        </div>
      </div>
    </section>

    <section class="panel input-panel" aria-label="タスク入力">
      <div class="input-row">
        <button type="button" class="voice-button" id="voiceButton" aria-label="音声入力（ダミー）" title="音声入力（ダミー）">🎤</button>
        <input id="taskInput" class="task-input" type="text" inputmode="text" enterkeyhint="done" placeholder="例：2限日本史、放課後に保護者へ電話、毎週月曜 1限HR" aria-label="タスク入力" maxlength="300" />
        <button type="button" class="add-button" id="addButton">追加</button>
      </div>
      <p class="helper-text">複数入力は「、」や改行で分けられます。時間だけある入力は今日の予定として扱います。確認待ち・毎週なども自動で整理します。</p>
    </section>

    <section class="panel tabs-panel" aria-label="タブ切り替え">
      <div class="tabs" role="tablist" aria-label="タスク分類">
        <button type="button" class="tab-button active" id="tabDeadline" data-tab="deadline" role="tab" aria-selected="true">期限あり</button>
        <button type="button" class="tab-button" id="tabNoDeadline" data-tab="noDeadline" role="tab" aria-selected="false">期限なし</button>
      </div>
    </section>

    <section class="panel list-panel">
      <div class="list-topbar">
        <div class="list-title-wrap">
          <h2 class="list-title" id="listTitle">期限ありのタスク</h2>
          <p class="list-note" id="listNote">期限が近い順に表示します。</p>
        </div>
        <button type="button" class="filter-button" id="toggleCompletedButton">完了を隠す</button>
      </div>
      <div class="task-list" id="taskList" aria-live="polite"></div>
    </section>
  </div>

  <div class="toast" id="toast" aria-live="assertive"></div>

  <script>
    (function () {
      "use strict";

      var STORAGE_KEY = "teacher_ai_secretary_tasks_v2";
      var PERIOD_SCHEDULE = {
        1: { hour: 10, minute: 0 },
        2: { hour: 11, minute: 0 },
        3: { hour: 12, minute: 0 },
        4: { hour: 13, minute: 30 },
        5: { hour: 14, minute: 30 },
        6: { hour: 15, minute: 30 },
        7: { hour: 16, minute: 30 },
        8: { hour: 17, minute: 30 }
      };
      var WEEKDAY_MAP = { "日":0, "月":1, "火":2, "水":3, "木":4, "金":5, "土":6 };

      var state = { tasks: [], currentTab: "deadline", hideCompleted: false };

      var taskInput = document.getElementById("taskInput");
      var addButton = document.getElementById("addButton");
      var voiceButton = document.getElementById("voiceButton");
      var tabDeadline = document.getElementById("tabDeadline");
      var tabNoDeadline = document.getElementById("tabNoDeadline");
      var taskList = document.getElementById("taskList");
      var listTitle = document.getElementById("listTitle");
      var listNote = document.getElementById("listNote");
      var toggleCompletedButton = document.getElementById("toggleCompletedButton");
      var toast = document.getElementById("toast");
      var alertTitle = document.getElementById("alertTitle");
      var alertText = document.getElementById("alertText");
      var nextTitle = document.getElementById("nextTitle");
      var nextText = document.getElementById("nextText");
      var assistantText = document.getElementById("assistantText");

      function generateId() {
        return "task_" + Date.now() + "_" + Math.random().toString(36).slice(2, 9);
      }
      function startOfToday() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      }
      function startOfTomorrow() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime();
      }
      function endOfToday() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999).getTime();
      }
      function endOfTomorrow() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 23, 59, 59, 999).getTime();
      }
      function endOfThisWeek() {
        var now = new Date();
        var day = now.getDay();
        var diffToSunday = 7 - day;
        return new Date(now.getFullYear(), now.getMonth(), now.getDate() + diffToSunday, 23, 59, 59, 999).getTime();
      }
      function endOfThisMonth() {
        var now = new Date();
        return new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999).getTime();
      }
      function formatClockTime(hour, minute) {
        return String(hour).padStart(2, "0") + ":" + String(minute).padStart(2, "0");
      }
      function formatJapaneseTime(hour, minute) {
        if (minute === 0) { return hour + "時"; }
        if (minute === 30) { return hour + "時半"; }
        return hour + "時" + String(minute).padStart(2, "0") + "分";
      }
      function formatMonthDay(month, day) {
        return month + "/" + day;
      }
      function buildTimestamp(year, month, day, hour, minute) {
        return new Date(year, month - 1, day, hour, minute, 0, 0).getTime();
      }
      function sanitizeText(text) {
        return String(text || "").replace(/\s+/g, " ").replace(/　+/g, " ").trim();
      }
      function adjustAmbiguousWorkTime(hour, minute, hasMeridiem) {
        if (hasMeridiem) { return { hour: hour, minute: minute }; }
        if (hour < 7 || (hour === 7 && minute < 30)) { return { hour: hour + 12, minute: minute }; }
        return { hour: hour, minute: minute };
      }
      function extractTimeInfo(text) {
        var match, meridiem = "", hour = null, minute = 0, adjusted;
        match = text.match(/(午前|午後)?\s*(\d{1,2})\s*:\s*(\d{1,2})/);
        if (match) { meridiem = match[1] || ""; hour = Number(match[2]); minute = Number(match[3]); }
        if (hour === null) {
          match = text.match(/(午前|午後)?\s*(\d{1,2})時\s*(\d{1,2})分/);
          if (match) { meridiem = match[1] || ""; hour = Number(match[2]); minute = Number(match[3]); }
        }
        if (hour === null) {
          match = text.match(/(午前|午後)?\s*(\d{1,2})時半/);
          if (match) { meridiem = match[1] || ""; hour = Number(match[2]); minute = 30; }
        }
        if (hour === null) {
          match = text.match(/(午前|午後)?\s*(\d{1,2})時/);
          if (match) { meridiem = match[1] || ""; hour = Number(match[2]); minute = 0; }
        }
        if (hour === null) { return null; }
        if (meridiem === "午後" && hour < 12) { hour += 12; }
        if (meridiem === "午前" && hour === 12) { hour = 0; }
        adjusted = adjustAmbiguousWorkTime(hour, minute, meridiem !== "");
        hour = adjusted.hour; minute = adjusted.minute;
        if (hour > 23 || minute > 59) { return null; }
        return { hour: hour, minute: minute, text: formatClockTime(hour, minute) };
      }
      function extractPeriodInfo(text) {
        var match = text.match(/^(\d(?:[\.・、,]\d+)*)限/);
        var raw, parts, first, last, firstSchedule, lastSchedule, endDate;
        if (!match) { return null; }
        raw = match[1];
        parts = raw.split(/[\.・、,]/).map(function (item) { return Number(item); }).filter(function (item) { return PERIOD_SCHEDULE[item]; });
        if (parts.length === 0) { return null; }
        first = parts[0];
        last = parts[parts.length - 1];
        firstSchedule = PERIOD_SCHEDULE[first];
        lastSchedule = PERIOD_SCHEDULE[last];
        endDate = new Date(2000, 0, 1, lastSchedule.hour, lastSchedule.minute + 50, 0, 0);
        return {
          label: raw + "限",
          firstPeriod: first,
          lastPeriod: last,
          startHour: firstSchedule.hour,
          startMinute: firstSchedule.minute,
          endHour: endDate.getHours(),
          endMinute: endDate.getMinutes(),
          display: raw + "限［" + formatJapaneseTime(firstSchedule.hour, firstSchedule.minute) + "〜" + formatJapaneseTime(endDate.getHours(), endDate.getMinutes()) + "］"
        };
      }
      function detectRecurrence(text) {
        var match = text.match(/毎週\s*([日月火水木金土])曜?/);
        if (match) {
          return { type: "weekly", weekday: WEEKDAY_MAP[match[1]], label: "毎週" + match[1] + "曜" };
        }
        if (/毎日/.test(text)) { return { type: "daily", label: "毎日" }; }
        if (/毎月末/.test(text)) { return { type: "month_end", label: "毎月末" }; }
        return null;
      }
      function stripRecurrenceText(text) {
        return text.replace(/毎週\s*[日月火水木金土]曜?/g, "").replace(/毎日/g, "").replace(/毎月末/g, "").trim();
      }
      function detectWaiting(text) {
        return /確認待ち|返答待ち|返信待ち|提出待ち|承認待ち|待ち/.test(text);
      }
      function stripWaitingText(text) {
        return text.replace(/確認待ち|返答待ち|返信待ち|提出待ち|承認待ち/g, "").trim();
      }
      function estimateMinutes(text, periodInfo, timeInfo) {
        if (periodInfo) {
          return Math.max(10, Math.round((buildTimestamp(2000,1,1,periodInfo.endHour,periodInfo.endMinute) - buildTimestamp(2000,1,1,periodInfo.startHour,periodInfo.startMinute)) / 60000));
        }
        if (/会議|授業|面談|面接|HR|ホームルーム/.test(text)) { return 50; }
        if (/電話|連絡/.test(text)) { return 10; }
        if (/確認|返信|返事|承認/.test(text)) { return 5; }
        if (/入力|作成|資料|準備|記録|報告|だより|成績/.test(text)) { return 20; }
        if (timeInfo) { return 10; }
        return 15;
      }
      function detectCategory(text) {
        if (/授業|HR|ホームルーム|教材|小テスト|板書|プリント|日本史|世界史|地理|公民|体育/.test(text)) { return "授業"; }
        if (/保護者|生徒|面談|来室|電話|連絡/.test(text)) { return "連絡"; }
        if (/会議|打合せ|職員会議|ミーティング/.test(text)) { return "会議"; }
        if (/進路|出願|面接|履歴書|調査書/.test(text)) { return "進路"; }
        if (/成績|入力|報告|記録|提出|確認/.test(text)) { return "事務"; }
        return "一般";
      }
      function removeLeadingDateTimeAndPeriod(text) {
        var title = text;
        title = stripRecurrenceText(title);
        title = stripWaitingText(title);
        title = title.replace(/^(今日中|今日まで|今日|明日まで|明日中|明日|今週中|今週|今月中|今月)\s*/i, "");
        title = title.replace(/^(\d{1,2})\s*\/\s*(\d{1,2})\s*/i, "");
        title = title.replace(/^(\d{1,2})月(\d{1,2})日\s*/i, "");
        title = title.replace(/^(\d{1,2})日\s*(までに|まで|〆切|締切)?\s*/i, "");
        title = title.replace(/^(締切|〆切)\s*/i, "");
        title = title.replace(/^(\d(?:[\.・、,]\d+)*)限\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}\s*:\s*\d{1,2}\s*(に|から)?\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}時\s*\d{1,2}分\s*(に|から)?\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}時半\s*(に|から)?\s*/i, "");
        title = title.replace(/^(午前|午後)?\s*\d{1,2}時\s*(に|から)?\s*/i, "");
        title = title.replace(/^放課後に?\s*/i, "");
        title = title.replace(/^昼休みに?\s*/i, "");

        tasks = createTasksFromInput(inputText);
        if (!tasks.length) { showToast("タスクを追加できませんでした。"); return; }
        state.tasks = tasks.concat(state.tasks);
        saveTasks(state.tasks);
        taskInput.value = "";
        state.currentTab = tasks.some(function (task) { return task.hasDeadline; }) ? "deadline" : "noDeadline";
        renderTasks();
        taskInput.focus();
        showToast(tasks.length > 1 ? tasks.length + "件追加しました。" : "追加しました。");
      }
      function createNextRecurringTask(task) {
        var recurrence = task.recurrence;
        var nextDate;
        if (!recurrence) { return null; }
        if (recurrence.type === "weekly") { nextDate = nextWeeklyDate(recurrence.weekday, new Date(task.deadlineTimestamp).getHours(), new Date(task.deadlineTimestamp).getMinutes()); }
        if (recurrence.type === "daily") { nextDate = nextDailyDate(new Date(task.deadlineTimestamp).getHours(), new Date(task.deadlineTimestamp).getMinutes()); }
        if (recurrence.type === "month_end") { nextDate = nextMonthEndDate(new Date(task.deadlineTimestamp).getHours(), new Date(task.deadlineTimestamp).getMinutes()); }
        if (!nextDate) { return null; }
        return {
          id: generateId(),
          rawText: task.rawText,
          title: task.title,
          hasDeadline: true,
          deadlineText: formatMonthDay(nextDate.getMonth() + 1, nextDate.getDate()) + " " + formatClockTime(nextDate.getHours(), nextDate.getMinutes()),
          deadlineTimestamp: nextDate.getTime(),
          completed: false,
          createdAt: Date.now(),
          category: task.category,
          estimatedMinutes: task.estimatedMinutes,
          waiting: false,
          recurrence: task.recurrence
        };
      }
      function toggleTaskComplete(taskId) {
        var recurringToAdd = null;
        state.tasks = state.tasks.map(function (task) {
          if (task.id === taskId) {
            var updated = {
              id: task.id,
              rawText: task.rawText,
              title: task.title,
              hasDeadline: task.hasDeadline,
              deadlineText: task.deadlineText,
              deadlineTimestamp: task.deadlineTimestamp,
              completed: !task.completed,
              createdAt: task.createdAt,
              category: task.category,
              estimatedMinutes: task.estimatedMinutes,
              waiting: task.waiting,
              recurrence: task.recurrence
            };
            if (!task.completed && updated.completed && task.recurrence) {
              recurringToAdd = createNextRecurringTask(task);
            }
            return updated;
          }
          return hydrateTask(task);
        });
        if (recurringToAdd) { state.tasks.unshift(recurringToAdd); }
        saveTasks(state.tasks);
        renderTasks();
      }
      function deleteTask(taskId) {
        state.tasks = state.tasks.filter(function (task) { return task.id !== taskId; });
        saveTasks(state.tasks);
        renderTasks();
      }
      function switchTab(tabName) { state.currentTab = tabName; renderTasks(); }
      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () { toast.classList.remove("show"); }, 1800);
      }
      function handleVoiceDummy() { showToast("音声入力は今後追加予定です。"); }
      function bindEvents() {
        addButton.addEventListener("click", addTask);
        taskInput.addEventListener("keydown", function (event) { if (event.key === "Enter") { event.preventDefault(); addTask(); } });
        voiceButton.addEventListener("click", handleVoiceDummy);
        tabDeadline.addEventListener("click", function () { switchTab("deadline"); });
        tabNoDeadline.addEventListener("click", function () { switchTab("noDeadline"); });
        toggleCompletedButton.addEventListener("click", function () { state.hideCompleted = !state.hideCompleted; renderTasks(); });
      }
      function init() {
        state.tasks = loadTasks().map(hydrateTask);
        bindEvents();
        renderTasks();
      }
      init();
    })();
  </script>
</body>
</html>
